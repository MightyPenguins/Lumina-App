<script>
let cards = [];
let currentIndex = 0;

const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

// ✅ Fallback lessons (so app ALWAYS works)
const fallbackLessons = {
    Philosophy: [
        { title: "Stoicism", content: "Focus only on what you control.", icon: "brain" },
        { title: "Virtue", content: "Character defines a good life.", icon: "shield" },
        { title: "Wisdom", content: "Seek truth, not comfort.", icon: "lightbulb" },
        { title: "Logos", content: "Reason governs the universe.", icon: "atom" },
        { title: "Discipline", content: "Master yourself first.", icon: "target" }
    ],
    History: [
        { title: "Patterns", content: "History repeats through human behavior.", icon: "repeat" },
        { title: "Power", content: "Power shapes narratives.", icon: "crown" },
        { title: "Conflict", content: "War accelerates change.", icon: "flame" },
        { title: "Leaders", content: "Individuals can shift history.", icon: "user" },
        { title: "Lessons", content: "Study the past to predict the future.", icon: "book" }
    ]
};

async function setTopic(topic) {
    const apiKey = document.getElementById('api-key').value;

    // ✅ Allow app to work WITHOUT API key
    if (!apiKey) {
        console.warn("No API key — using fallback lessons");
        cards = fallbackLessons[topic] || fallbackLessons["Philosophy"];
        startApp();
        return;
    }

    showLoader(true);

    try {
        const response = await fetch(`${API_URL}?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: `Return ONLY valid JSON.

Format:
[
  {"title": "Short title", "content": "1-2 sentence insight", "icon": "book-open"},
  {"title": "Short title", "content": "1-2 sentence insight", "icon": "brain"},
  {"title": "Short title", "content": "1-2 sentence insight", "icon": "atom"},
  {"title": "Short title", "content": "1-2 sentence insight", "icon": "scroll"},
  {"title": "Short title", "content": "1-2 sentence insight", "icon": "lightbulb"}
]

Topic: ${topic}`
                    }]
                }]
            })
        });

        const data = await response.json();
        console.log("Gemini response:", data);

        const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text;

        try {
            cards = JSON.parse(rawText);
        } catch (e) {
            console.error("JSON parse failed:", rawText);

            // fallback if AI fails
            cards = fallbackLessons[topic] || fallbackLessons["Philosophy"];
        }

        startApp();

    } catch (error) {
        console.error("Fetch failed:", error);

        // fallback if request fails
        cards = fallbackLessons[topic] || fallbackLessons["Philosophy"];
        startApp();

    } finally {
        showLoader(false);
    }
}

function startApp() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('card-container').classList.remove('hidden');
    currentIndex = 0;
    renderCard();
}

function renderCard() {
    const container = document.getElementById('current-card');
    const card = cards[currentIndex];

    if (!card) return;

    container.classList.add('card-exit');

    setTimeout(() => {
        container.innerHTML = `
            <div class="text-amber-500/20 mb-4 scale-150">
                <i data-lucide="${card.icon || 'book-open'}"></i>
            </div>
            <h2 class="serif text-4xl font-bold leading-tight text-white px-2">${card.title}</h2>
            <p class="text-slate-400 text-lg font-light leading-relaxed max-w-[280px]">${card.content}</p>
        `;

        lucide.createIcons();

        container.classList.remove('card-exit');
        container.classList.add('card-enter');
        requestAnimationFrame(() => {
            container.classList.remove('card-enter');
        });

        updateUI();
    }, 300);
}

function nextCard() {
    if (currentIndex < cards.length - 1) {
        currentIndex++;
        renderCard();
    } else {
        location.reload();
    }
}

function prevCard() {
    if (currentIndex > 0) {
        currentIndex--;
        renderCard();
    }
}

function updateUI() {
    document.getElementById('card-counter').innerText =
        `${String(currentIndex + 1).padStart(2, '0')} / ${String(cards.length).padStart(2, '0')}`;

    document.getElementById('progress').style.width =
        `${((currentIndex + 1) / cards.length) * 100}%`;

    const nextBtn = document.getElementById('next-btn');

    if (currentIndex === cards.length - 1) {
        nextBtn.innerHTML = '<i data-lucide="refresh-cw"></i>';
    } else {
        nextBtn.innerHTML = '<i data-lucide="chevron-right"></i>';
    }

    lucide.createIcons();
}

function showLoader(show) {
    document.getElementById('loader').classList.toggle('hidden', !show);
}

// init icons safely
document.addEventListener("DOMContentLoaded", () => {
    if (window.lucide) {
        lucide.createIcons();
    }
});
</script>
