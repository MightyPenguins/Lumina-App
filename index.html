<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumina</title>

<link rel="icon" href="data:,">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

<div class="max-w-xl w-full p-6">

<div id="home" class="space-y-4 text-center">
<h1 class="text-4xl font-bold">Lumina</h1>
<p class="text-slate-400">Learn something new in minutes</p>

<div class="space-y-2 mt-4">
<button onclick="startLesson('Psychology')" class="bg-blue-600 w-full p-3 rounded">Psychology</button>
<button onclick="startLesson('Philosophy')" class="bg-purple-600 w-full p-3 rounded">Philosophy</button>
<button onclick="startLesson('Business')" class="bg-green-600 w-full p-3 rounded">Business</button>
<button onclick="startLesson('Fitness')" class="bg-red-600 w-full p-3 rounded">Fitness</button>
<button onclick="startLesson('Technology')" class="bg-yellow-600 w-full p-3 rounded">Technology</button>
</div>
</div>

<div id="lesson" class="hidden">
<div class="h-2 bg-slate-700 rounded mb-4">
<div id="progress-bar" class="h-2 bg-blue-500 rounded"></div>
</div>

<div id="card"></div>
</div>

</div>

<script>
const API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE";

let lesson = null;
let index = 0;
let learned = 0;
let review = [];

async function startLesson(topic) {
document.getElementById("home").classList.add("hidden");
document.getElementById("lesson").classList.remove("hidden");

document.getElementById("card").innerHTML = "Generating lesson...";

try {

const res = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
{
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
contents: [{
parts: [{
text: `Create a structured microlearning lesson.

Return ONLY valid JSON:

{
"lessonTitle": "",
"overview": "",
"cards": [
{"title":"","content":"","icon":"book-open"}
],
"summary": ""
}

Rules:
- 6 to 8 cards
- Each card teaches ONE idea
- Clear and practical

Topic: ${topic}`
}]
}]
})
}
);

const data = await res.json();
let text = data.candidates[0].content.parts[0].text;

text = text.replace(/```json/g, "").replace(/```/g, "");

lesson = JSON.parse(text);

index = 0;
learned = 0;
review = [];

render();

} catch (e) {
console.error(e);
document.getElementById("card").innerHTML =
"<p>Error generating lesson.</p><button onclick='location.reload()' class='mt-4 bg-blue-500 px-4 py-2 rounded'>Retry</button>";
}
}

function render() {
const c = lesson.cards[index];

const progress = ((index) / lesson.cards.length) * 100;
document.getElementById("progress-bar").style.width = progress + "%";

document.getElementById("card").innerHTML = `
<div class="space-y-4">

${index === 0 ? `
<div>
<h1 class="text-3xl font-bold">${lesson.lessonTitle}</h1>
<p class="text-slate-400">${lesson.overview}</p>
</div>
` : ""}

<div class="text-amber-500 text-3xl">
<i data-lucide="${c.icon || 'book-open'}"></i>
</div>

<h2 class="text-2xl font-bold">${c.title}</h2>
<p class="text-slate-400">${c.content}</p>

<div class="flex gap-2 mt-4">
<button onclick="understand()" class="bg-green-600 flex-1 p-2 rounded">Got it</button>
<button onclick="later()" class="bg-yellow-600 flex-1 p-2 rounded">Review</button>
</div>

<p class="text-center text-sm text-slate-500">
${index + 1} / ${lesson.cards.length}
</p>

</div>
`;

lucide.createIcons();
}

function understand() {
learned++;
next();
}

function later() {
review.push(lesson.cards[index]);
next();
}

function next() {
index++;
if (index >= lesson.cards.length) {
summary();
} else {
render();
}
}

function summary() {
document.getElementById("progress-bar").style.width = "100%";

document.getElementById("card").innerHTML = `
<div class="text-center space-y-4">

<h2 class="text-3xl font-bold">${lesson.lessonTitle} Complete</h2>

<p class="text-slate-400">${lesson.summary}</p>

<p class="text-green-400">Learned: ${learned}</p>
<p class="text-yellow-400">Review: ${review.length}</p>

<button onclick="location.reload()" class="bg-blue-600 px-4 py-2 rounded">
New Lesson
</button>

</div>
`;
}
</script>

</body>
</html>
